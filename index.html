    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    :root { --bg: #0d0d0d; --fg: #f0ece4; --accent: #c8b89a; --muted: #4a4540; }
    body {
      background: var(--bg); color: var(--fg); font-family: 'DM Mono', monospace;
      min-height: 100vh; display: flex; flex-direction: column;
      align-items: center; justify-content: center; overflow: hidden; position: relative;
    }
    body::before {
      content: ''; position: fixed; inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none; z-index: 10;
    }
    .glow-bg {
      position: fixed; width: 600px; height: 600px; border-radius: 50%;
      background: radial-gradient(circle, rgba(200,184,154,0.07) 0%, transparent 70%);
      top: 50%; left: 50%; transform: translate(-50%, -50%); pointer-events: none;
      animation: glowPulse 6s ease-in-out infinite;
    }
    @keyframes glowPulse {
      0%, 100% { opacity: 0.6; transform: translate(-50%, -50%) scale(1); }
      50% { opacity: 1; transform: translate(-50%, -50%) scale(1.1); }
    }
    .container { text-align: center; z-index: 1; animation: fadeIn 1.4s ease forwards; }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(18px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .dots {
      display: flex; justify-content: center; align-items: center;
      gap: 2rem; margin-bottom: 2.5rem; height: 80px;
    }
    .dot {
      width: 18px; height: 18px; border-radius: 50%;
      background: radial-gradient(circle at 38% 35%, #fff 0%, #c8b89a 40%, #6b5c48 100%);
      box-shadow: 0 0 6px 1px rgba(200,184,154,0.2);
      animation: orbPulse 2.4s ease-in-out infinite;
      flex-shrink: 0;
    }
    .dot:nth-child(1) { animation-delay: 0s; }
    .dot:nth-child(2) { animation-delay: 0.4s; }
    .dot:nth-child(3) { animation-delay: 0.8s; }

    @keyframes orbPulse {
      0%, 100% {
        transform: scale(1);
        box-shadow: 0 0 6px 1px rgba(200,184,154,0.2);
        background: radial-gradient(circle at 38% 35%, #aaa 0%, #6b5c48 50%, #2a2420 100%);
      }

        transform: scale(1.6);

        background: radial-gradient(circle at 38% 35%, #fff 0%, #e8d4a8 35%, #c8a060 70%, #7a5830 100%);
      }
    }

    }
